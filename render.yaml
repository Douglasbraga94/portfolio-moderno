services:
  # Backend API
  - type: web
    name: portfolio-api
    env: docker
    dockerContext: api
    dockerfilePath: api/Dockerfile
    region: ohio
    envVars:
      - key: APP_JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: portfolio-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
